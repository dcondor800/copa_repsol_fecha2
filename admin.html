function sKey(disc, cid, mi, f) { return `${disc}_${cid}_${mi}_${f}`; }
function getScores() { try { return JSON.parse(localStorage.getItem('copa_scores')||'{}'); } catch { return {}; } }
function save(k, v) {
  const s = getScores();
  v === '' ? delete s[k] : (s[k] = v);
  localStorage.setItem('copa_scores', JSON.stringify(s));
}
function getCal() { try { return JSON.parse(localStorage.getItem('copa_cal')||'null') || defaultCal(); } catch { return defaultCal(); } }

function inp(cls, key, scores) {
  const v = scores[key] !== undefined ? scores[key] : '';
  return `<input type="text" maxlength="2" class="score-inp ${cls}" value="${v}" oninput="save('${key}',this.value)">`;
}

function buildSets(disc, campo, scores) {
  return campo.matches.map((m, mi) => {
    const hi = m.hi ? ' hi' : '';
    const [t1,t2] = m.t;
    const c = campo.id, d = disc;
    return `<div class="match-block${hi}">
      <div class="team-row">
        <span class="team-name">${t1}</span>
        ${inp('',sKey(d,c,mi,'t1s1'),scores)}
        ${inp('',sKey(d,c,mi,'t1s2'),scores)}
        ${inp('',sKey(d,c,mi,'t1s3'),scores)}
        <span class="sep"></span>
        ${inp('lg',sKey(d,c,mi,'t1t'),scores)}
      </div>
      <div class="vs-label">vs</div>
      <div class="team-row">
        <span class="team-name">${t2}</span>
        ${inp('',sKey(d,c,mi,'t2s1'),scores)}
        ${inp('',sKey(d,c,mi,'t2s2'),scores)}
        ${inp('',sKey(d,c,mi,'t2s3'),scores)}
        <span class="sep"></span>
        ${inp('lg',sKey(d,c,mi,'t2t'),scores)}
      </div>
    </div>`;
  }).join('');
}

function buildScore(disc, campo, scores) {
  return campo.matches.map((m, mi) => {
    const [t1,t2] = m.t;
    const c = campo.id, d = disc;
    return `<div class="futbol-row">
      <span class="ft l">${t1}</span>
      ${inp('xl',sKey(d,c,mi,'s1'),scores)}
      <span class="vs-badge">vs</span>
      ${inp('xl',sKey(d,c,mi,'s2'),scores)}
      <span class="ft r">${t2}</span>
    </div>`;
  }).join('');
}

function buildPanel(disc) {
  const d = DISC[disc];
  const scores = getScores();
  const isSets = d.type === 'sets';
  const inner = d.campos.map(campo =>
    `<div class="campo-card">
      <h3>${campo.name}</h3>
      ${isSets ? buildSets(disc, campo, scores) : buildScore(disc, campo, scores)}
    </div>`
  ).join('');
  return `<div class="campos-grid">${inner}</div>
    <button class="export-btn" onclick="exportImg('${disc}')">⬇ Exportar imagen — ${d.name}</button>`;
}

let activeDisc = 'voley';
function switchTab(disc) {
  activeDisc = disc;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.disc===disc));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.toggle('active', p.dataset.disc===disc));
}

function init() {
  const bar = document.getElementById('tabBar');
  const panels = document.getElementById('panels');
  Object.keys(DISC).forEach((disc, i) => {
    const btn = document.createElement('button');
    btn.className = 'tab-btn' + (i===0 ? ' active' : '');
    btn.dataset.disc = disc;
    btn.textContent = DISC[disc].name;
    btn.onclick = () => switchTab(disc);
    bar.appendChild(btn);

    const p = document.createElement('div');
    p.className = 'tab-panel' + (i===0 ? ' active' : '');
    p.dataset.disc = disc;
    p.innerHTML = buildPanel(disc);
    panels.appendChild(p);
  });
}

function exportImg(disc) {
  const d = DISC[disc];
  const scores = getScores();
  const cal = getCal();
  const img = new Image();
  img.onload = function() {
    const W = img.naturalWidth, H = img.naturalHeight;
    const cv = document.createElement('canvas');
    cv.width = W; cv.height = H;
    const ctx = cv.getContext('2d');
    ctx.drawImage(img, 0, 0);
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    pintarScores(ctx, disc, d, scores, cal, W, H);
    try {
      cv.toBlob(blob => {
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `${disc}_resultados.png`;
        a.click();
        setTimeout(() => URL.revokeObjectURL(a.href), 5000);
      }, 'image/png');
    } catch(e) {
      abrirVentana(disc, d, scores, cal);
    }
  };
  img.onerror = () => abrirVentana(disc, d, scores, cal);
  img.src = d.image;
}

function pintarScores(ctx, disc, d, scores, cal, W, H) {
  const dc = cal[disc] || {};
  d.campos.forEach(campo => {
    const cc = dc[campo.id] || {};
    campo.matches.forEach((m, mi) => {
      const mc = cc[mi] || {};
      const fields = d.type === 'sets' ? ['t1s1','t1s2','t1s3','t1t','t2s1','t2s2','t2s3','t2t'] : ['s1','s2'];
      fields.forEach(f => {
        const pos = mc[f], val = scores[sKey(disc, campo.id, mi, f)];
        if (!pos || val === undefined || val === '') return;
        const isTotal = f.endsWith('t'), isFut = d.type === 'score', isSets = d.type === 'sets' && !isTotal;
        ctx.fillStyle = isSets ? '#ffffff' : '#111111';
        ctx.font = `900 ${isFut ? 48 : isTotal ? 36 : 28}px Arial, sans-serif`;
        ctx.fillText(String(val), (pos.x/100)*W, (pos.y/100)*H);
      });
    });
  });
}

function abrirVentana(disc, d, scores, cal) {
  const imgUrl = new URL(d.image, location.href).href;
  const dc = cal[disc] || {};
  let spans = '';
  d.campos.forEach(campo => {
    const cc = dc[campo.id] || {};
    campo.matches.forEach((m, mi) => {
      const mc = cc[mi] || {};
      const fields = d.type === 'sets' ? ['t1s1','t1s2','t1s3','t1t','t2s1','t2s2','t2s3','t2t'] : ['s1','s2'];
      fields.forEach(f => {
        const pos = mc[f], val = scores[sKey(disc, campo.id, mi, f)];
        if (!pos || val === undefined || val === '') return;
        const isTotal = f.endsWith('t'), isFut = d.type === 'score', isSets = d.type === 'sets' && !isTotal;
        const color = isSets ? '#fff' : '#111';
        const fs = isFut ? '4.5vw' : isTotal ? '3.2vw' : '2.6vw';
        spans += `<span style="position:absolute;left:${pos.x}%;top:${pos.y}%;transform:translate(-50%,-50%);font-weight:900;color:${color};font-size:${fs};line-height:1;font-family:Arial,sans-serif;pointer-events:none">${val}</span>`;
      });
    });
  });

  const popup = window.open('', '_blank', `width=${screen.width},height=${screen.height},scrollbars=yes`);
  if (!popup) { alert('Permite ventanas emergentes para este sitio.'); return; }
  popup.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>${d.name}</title>
<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#000}.bar{background:#0d2144;padding:10px 16px;display:flex;gap:10px;align-items:center;flex-wrap:wrap}.frame{position:relative;line-height:0}.frame img{width:100%;display:block}@media print{.bar{display:none!important}}</style>
</head><body>
<div class="bar">
  <span style="color:#4dd9e8;font:bold 14px Arial;flex:1">Copa Repsol — ${d.name}</span>
  <span style="color:#aaa;font:12px Arial">💡 Win+Shift+S para capturar &nbsp;|&nbsp; o</span>
  <button onclick="window.print()" style="padding:7px 16px;background:#e8521a;border:none;border-radius:6px;color:#fff;font-weight:700;font-size:13px;cursor:pointer">🖨 Guardar PDF</button>
  <button onclick="window.close()" style="padding:7px 14px;background:#1a3a60;border:none;border-radius:6px;color:#ccc;font-size:13px;cursor:pointer">✕</button>
</div>
<div class="frame"><img src="${imgUrl}">${spans}</div>
</body></html>`);
  popup.document.close();
}

init();
</script>
</body>
</html>
