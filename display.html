function renderOverlays(disc, frameEl) {
  frameEl.querySelectorAll('.ov').forEach(e => e.remove());
  const scores = getScores();
  const cal = getCal();
  const d = DISC[disc];
  const discCal = cal[disc] || {};

  d.campos.forEach(campo => {
    const cc = discCal[campo.id] || {};
    campo.matches.forEach((m, mi) => {
      const mc = cc[mi] || {};
      const fields = d.type === 'sets'
        ? ['t1s1','t1s2','t1s3','t1t','t2s1','t2s2','t2s3','t2t']
        : ['s1','s2'];
      fields.forEach(f => {
        const pos = mc[f];
        const val = scores[sKey(disc, campo.id, mi, f)];
        if (!pos || val === undefined || val === '') return;
        const el = document.createElement('span');
        const isTotal = f.endsWith('t');
        const isFut = d.type === 'score';
        const isSets = d.type === 'sets' && !isTotal;
        el.className = 'ov' + (isFut ? ' fut' : (isTotal ? ' tot' : '')) + (isSets ? ' wht' : '');
        el.style.left = pos.x + '%';
        el.style.top  = pos.y + '%';
        el.textContent = val;
        frameEl.appendChild(el);
      });
    });
  });
}

function renderAll() {
  Object.keys(DISC).forEach(disc => {
    const frame = document.getElementById('frame-' + disc);
    if (frame) renderOverlays(disc, frame);
  });
}

let activeDisc = 'voley';
function switchTab(disc) {
  activeDisc = disc;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.disc===disc));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.toggle('active', p.dataset.disc===disc));
}

function init() {
  const bar = document.getElementById('tabBar');
  const panels = document.getElementById('panels');
  Object.keys(DISC).forEach((disc, i) => {
    const btn = document.createElement('button');
    btn.className = 'tab-btn' + (i===0?' active':'');
    btn.dataset.disc = disc;
    btn.textContent = DISC[disc].name;
    btn.onclick = () => switchTab(disc);
    bar.appendChild(btn);

    const p = document.createElement('div');
    p.className = 'tab-panel' + (i===0?' active':'');
    p.dataset.disc = disc;

    const frame = document.createElement('div');
    frame.className = 'img-frame';
    const img = document.createElement('img');
    img.src = DISC[disc].image;
    img.alt = DISC[disc].name;
    frame.appendChild(img);
    frame.id = 'frame-' + disc;
    frame.style.position = 'relative';
    p.appendChild(frame);
    panels.appendChild(p);
  });
  renderAll();
}

let uiVisible = true;
function toggleUI() {
  uiVisible = !uiVisible;
  ['topBar','tabBar'].forEach(id => {
    document.getElementById(id).style.display = uiVisible ? '' : 'none';
  });
}

window.addEventListener('storage', e => {
  if (e.key === 'copa_scores' || e.key === 'copa_cal') renderAll();
});

init();
